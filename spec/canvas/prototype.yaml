openapi: 3.1.0
info:
  title: Canvas LMS REST API (users prototype slice)
  version: 'prototype-0.1.0'
  description: |
    Hand-authored OpenAPI 3.1 fragment covering only the Canvas users
    endpoints exercised by the canvas-lms-mcp prototype for GitHub issue #78.
    This is intentionally narrow — not a full Canvas spec. See
    `spec/canvas/README.md` for why this is hand-authored rather than pulled
    from Canvas's `rake doc:openapi`.
servers:
  - url: '{canvasBaseUrl}'
    variables:
      canvasBaseUrl:
        default: https://canvas.instructure.com
        description: Canvas instance base URL (without `/api/v1`).
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    PerPage:
      name: per_page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
  schemas:
    User:
      type: object
      required:
        - id
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        sortable_name:
          type: string
        short_name:
          type: string
        sis_user_id:
          type: [string, 'null']
        integration_id:
          type: [string, 'null']
        sis_import_id:
          type: [integer, 'null']
        login_id:
          type: string
        avatar_url:
          type: string
        enrollments:
          type: array
          items:
            $ref: '#/components/schemas/Enrollment'
        email:
          type: string
        locale:
          type: [string, 'null']
        last_login:
          type: [string, 'null']
          format: date-time
        time_zone:
          type: string
        bio:
          type: [string, 'null']
    UserProfile:
      type: object
      required:
        - id
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        short_name:
          type: string
        sortable_name:
          type: string
        title:
          type: [string, 'null']
        bio:
          type: [string, 'null']
        primary_email:
          type: string
        login_id:
          type: string
        sis_user_id:
          type: [string, 'null']
        lti_user_id:
          type: [string, 'null']
        avatar_url:
          type: string
        calendar:
          type: object
          properties:
            ics:
              type: string
        time_zone:
          type: string
        locale:
          type: string
    Enrollment:
      type: object
      required:
        - id
        - course_id
        - type
      properties:
        id:
          type: integer
        course_id:
          type: integer
        type:
          type: string
        role:
          type: string
        enrollment_state:
          type: string
    UpcomingEvent:
      type: object
      required:
        - id
      properties:
        id:
          oneOf:
            - type: integer
            - type: string
        title:
          type: string
        start_at:
          type: [string, 'null']
          format: date-time
        end_at:
          type: [string, 'null']
          format: date-time
        type:
          type: string
        html_url:
          type: string
        assignment:
          type: object
paths:
  /api/v1/users/{id}:
    get:
      operationId: showUser
      summary: Get a single user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            oneOf:
              - type: integer
              - type: string
      responses:
        '200':
          description: User
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
  /api/v1/users/self/profile:
    get:
      operationId: showSelfProfile
      summary: Get current user profile
      responses:
        '200':
          description: UserProfile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
  /api/v1/users/self/upcoming_events:
    get:
      operationId: listSelfUpcomingEvents
      summary: List current user upcoming events
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [Assignment, Event]
      responses:
        '200':
          description: List of upcoming events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UpcomingEvent'
  /api/v1/courses/{course_id}/users:
    get:
      operationId: listCourseUsers
      summary: List users enrolled in a course
      parameters:
        - name: course_id
          in: path
          required: true
          schema:
            oneOf:
              - type: integer
              - type: string
        - $ref: '#/components/parameters/PerPage'
        - name: search_term
          in: query
          required: false
          schema:
            type: string
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [username, email, sis_id, integration_id, last_login]
        - name: order
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
        - name: enrollment_role_id
          in: query
          required: false
          schema:
            type: integer
        - name: user_id
          in: query
          required: false
          schema:
            oneOf:
              - type: integer
              - type: string
        - name: enrollment_type[]
          in: query
          required: false
          explode: true
          schema:
            type: array
            items:
              type: string
              enum: [student, teacher, ta, observer, designer]
        - name: enrollment_state[]
          in: query
          required: false
          explode: true
          schema:
            type: array
            items:
              type: string
              enum: [active, invited, rejected, completed, inactive]
        - name: include[]
          in: query
          required: false
          explode: true
          schema:
            type: array
            items:
              type: string
              enum:
                - email
                - enrollments
                - locked
                - avatar_url
                - test_student
                - bio
                - custom_links
                - current_grading_period_scores
        - name: user_ids[]
          in: query
          required: false
          explode: true
          schema:
            type: array
            items:
              oneOf:
                - type: integer
                - type: string
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
  /api/v1/accounts/{account_id}/users:
    get:
      operationId: listAccountUsers
      summary: List/search users in an account
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            oneOf:
              - type: integer
              - type: string
        - $ref: '#/components/parameters/PerPage'
        - name: search_term
          in: query
          required: false
          schema:
            type: string
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [username, email, sis_id, integration_id, last_login]
        - name: order
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
        - name: include[]
          in: query
          required: false
          explode: true
          schema:
            type: array
            items:
              type: string
              enum: [email, last_login, avatar_url, time_zone]
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
