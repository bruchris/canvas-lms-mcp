# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml

startCommand:
  type: stdio

configSchema:
  type: object
  required:
    - canvasApiToken
    - canvasBaseUrl
  properties:
    canvasApiToken:
      type: string
      description: >
        Your Canvas personal access token. In Canvas, go to Account > Settings >
        Approved Integrations > New Access Token to generate one.
    canvasBaseUrl:
      type: string
      description: >
        Your Canvas instance API base URL. Append /api/v1 to your school's Canvas
        domain, e.g. https://yourschool.instructure.com/api/v1

commandFunction: |-
  (config) => ({
    command: 'npx',
    args: ['-y', '@bruchris/canvas-lms-mcp'],
    env: {
      CANVAS_API_TOKEN: config.canvasApiToken,
      CANVAS_BASE_URL: config.canvasBaseUrl
    }
  })

exampleConfig:
  canvasApiToken: "1234~abcdefghijklmnopqrstuvwxyz"
  canvasBaseUrl: "https://school.instructure.com/api/v1"
